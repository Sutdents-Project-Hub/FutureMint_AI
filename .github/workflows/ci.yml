name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    name: API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install API dependencies
        run: npm ci
      - name: Run API tests
        run: npm test
      - name: Typecheck API
        run: npm run typecheck
      - name: Build API
        run: npm run build
      - name: Evaluate capture fixtures
        run: npm run evaluate:captures

  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true
      - name: Install Flutter dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test
      - name: Analyze Flutter app
        run: flutter analyze
      - name: Run Flutter tests
        run: flutter test
