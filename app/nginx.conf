server {
  listen 3000;
  listen [::]:3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;

  location = /index.html {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location ~* ^/(flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|version\.json)$ {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|wasm|json|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json application/wasm image/svg+xml;
}
