<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FutureMint AI — 青少年的 AI 金錢決策教練。">
  <meta name="theme-color" content="#6D5BD0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FutureMint AI">
  <link rel="apple-touch-icon" href="icons/futuremint-icon.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icons/futuremint-icon.svg"/>

  <title>FutureMint AI</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Local previews can retain an older Flutter Service Worker after a
    // rebuild. Visiting ?reset-cache once explicitly clears only this origin's
    // Service Worker and Cache Storage, then returns to the normal URL.
    if (new URLSearchParams(window.location.search).has('reset-cache')) {
      window.addEventListener(
        'load',
        async () => {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }
          window.location.replace(window.location.pathname + window.location.hash);
        },
        {once: true},
      );
    }
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
